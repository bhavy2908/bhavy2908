<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 360" width="840" height="360">
  <defs>
    <style>
      @keyframes sweep { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
      @keyframes pulse-dot { 0%,100%{r:5;opacity:1} 50%{r:8;opacity:0.7} }
      @keyframes blink-text { 0%,100%{opacity:1} 50%{opacity:0.3} }
      @keyframes rain-drop { 0%{opacity:0;transform:translateY(-20px)} 20%{opacity:1} 80%{opacity:1} 100%{opacity:0;transform:translateY(20px)} }
      .sweep-group { transform-origin: 260px 180px; animation: sweep 5s linear infinite; }
      .pulse { animation: pulse-dot 2s ease-in-out infinite; }
      .blink { animation: blink-text 1.5s ease-in-out infinite; }
    </style>
    <radialGradient id="matrixBg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#030f03"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <radialGradient id="skillFill" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ff41" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#003b00" stop-opacity="0.05"/>
    </radialGradient>
    <linearGradient id="sweepGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00ff41" stop-opacity="0"/>
      <stop offset="100%" stop-color="#00ff41" stop-opacity="0.5"/>
    </linearGradient>
    <filter id="matrix-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="scanlines" x="0" y="0" width="840" height="3" patternUnits="userSpaceOnUse">
      <rect width="840" height="1" fill="rgba(0,255,65,0.03)"/>
    </pattern>
  </defs>

  <!-- Background and Border removed for flawless blend -->
  <g transform="translate(30, 0)">

  <!-- Matrix digital rain columns (background effect, purely decorative) -->
  <text x="12" y="30" font-family="monospace" font-size="10" fill="#00ff41" opacity="0.04">01001000100110001011010010</text>
  <text x="12" y="42" font-family="monospace" font-size="10" fill="#00ff41" opacity="0.06">11010011001010110110100100</text>
  <text x="12" y="54" font-family="monospace" font-size="10" fill="#00ff41" opacity="0.04">00110100110100100101001011</text>
  <text x="12" y="310" font-family="monospace" font-size="10" fill="#00ff41" opacity="0.04">10010101100101010011001011</text>
  <text x="12" y="322" font-family="monospace" font-size="10" fill="#00ff41" opacity="0.06">01110010011110001010010010</text>
  <text x="12" y="334" font-family="monospace" font-size="10" fill="#00ff41" opacity="0.04">11001001010100101010110110</text>

  <!-- ========================= RADAR (LEFT SECTION) ========================= -->

  <!-- Title bar -->
  <text x="260" y="22" font-family="monospace" font-size="10" fill="#00ff41" text-anchor="middle" opacity="0.6">[ SKILL PROFICIENCY MATRIX ]</text>

  <!-- Grid crosshairs -->
  <line x1="260" y1="30" x2="260" y2="340" stroke="#00ff41" stroke-width="0.3" opacity="0.12"/>
  <line x1="20" y1="185" x2="500" y2="185" stroke="#00ff41" stroke-width="0.3" opacity="0.12"/>
  <!-- Diagonal lines -->
  <line x1="136" y1="61" x2="384" y2="309" stroke="#00ff41" stroke-width="0.3" opacity="0.08"/>
  <line x1="384" y1="61" x2="136" y2="309" stroke="#00ff41" stroke-width="0.3" opacity="0.08"/>

  <!-- Radar rings -->
  <circle cx="260" cy="185" r="28" fill="none" stroke="#00ff41" stroke-width="0.5" opacity="0.15"/>
  <circle cx="260" cy="185" r="55" fill="none" stroke="#00ff41" stroke-width="0.5" opacity="0.15"/>
  <circle cx="260" cy="185" r="82" fill="none" stroke="#00ff41" stroke-width="0.5" opacity="0.15"/>
  <circle cx="260" cy="185" r="109" fill="none" stroke="#00ff41" stroke-width="0.5" opacity="0.15"/>
  <circle cx="260" cy="185" r="136" fill="none" stroke="#00ff41" stroke-width="0.6" opacity="0.18"/>

  <!-- Axis spokes (6 axes, 60° apart) -->
  <!-- 0°   top:          (260, 49)   -->
  <!-- 60°  top-right:    (377.7, 117) -->
  <!-- 120° bottom-right: (377.7, 253) -->
  <!-- 180° bottom:       (260, 321)  -->
  <!-- 240° bottom-left:  (142.3, 253)-->
  <!-- 300° top-left:     (142.3, 117)-->
  <line x1="260" y1="185" x2="260" y2="49" stroke="#00ff41" stroke-width="0.5" opacity="0.25" stroke-dasharray="4,4"/>
  <line x1="260" y1="185" x2="377.7" y2="117" stroke="#00ff41" stroke-width="0.5" opacity="0.25" stroke-dasharray="4,4"/>
  <line x1="260" y1="185" x2="377.7" y2="253" stroke="#00ff41" stroke-width="0.5" opacity="0.25" stroke-dasharray="4,4"/>
  <line x1="260" y1="185" x2="260" y2="321" stroke="#00ff41" stroke-width="0.5" opacity="0.25" stroke-dasharray="4,4"/>
  <line x1="260" y1="185" x2="142.3" y2="253" stroke="#00ff41" stroke-width="0.5" opacity="0.25" stroke-dasharray="4,4"/>
  <line x1="260" y1="185" x2="142.3" y2="117" stroke="#00ff41" stroke-width="0.5" opacity="0.25" stroke-dasharray="4,4"/>

  <!-- Skill polygon
    Systems Engineering      96%: 136 * 0.96 = 130.56 → (260, 185-130.56) = (260, 54.44)
    Neural Architecture      95%: 136 * 0.95 = 129.2 → (260+111.89, 185-64.6) = (371.89, 120.4)
    Protocol Engineering     92%: 136 * 0.92 = 125.12 → (260+108.35, 185+62.56) = (368.35, 247.56)
    Distributed Infra        94%: 136 * 0.94 = 127.84 → (260, 185+127.84) = (260, 312.84)
    Quantum Computing        88%: 136 * 0.88 = 119.68 → (260-103.64, 185+59.84) = (156.36, 244.84)
    Execution Languages      97%: 136 * 0.97 = 131.92 → (260-114.24, 185-65.96) = (145.76, 119.04)
  -->
  <polygon
    points="260,54.44 371.89,120.4 368.35,247.56 260,312.84 156.36,244.84 145.76,119.04"
    fill="url(#skillFill)"
    stroke="#00ff41"
    stroke-width="2"
    filter="url(#matrix-glow)"
  />

  <!-- Axis endpoint dots -->
  <circle cx="260" cy="54.44" r="5" fill="#00ff41" class="pulse" filter="url(#matrix-glow)"/>
  <circle cx="371.89" cy="120.4" r="5" fill="#00ff41" class="pulse" filter="url(#matrix-glow)" style="animation-delay:0.3s"/>
  <circle cx="368.35" cy="247.56" r="5" fill="#00ff41" class="pulse" filter="url(#matrix-glow)" style="animation-delay:0.6s"/>
  <circle cx="260" cy="312.84" r="5" fill="#00ff41" class="pulse" filter="url(#matrix-glow)" style="animation-delay:0.9s"/>
  <circle cx="156.36" cy="244.84" r="5" fill="#00ff41" class="pulse" filter="url(#matrix-glow)" style="animation-delay:1.2s"/>
  <circle cx="145.76" cy="119.04" r="5" fill="#00ff41" class="pulse" filter="url(#matrix-glow)" style="animation-delay:1.5s"/>

  <!-- Rotating radar sweep -->
  <g class="sweep-group">
    <line x1="260" y1="185" x2="260" y2="49" stroke="url(#sweepGrad)" stroke-width="2" opacity="0.6"/>
    <polygon points="260,185 250,105 272,105" fill="#00ff41" opacity="0.06"/>
  </g>

  <!-- Center node -->
  <circle cx="260" cy="185" r="7" fill="#00ff41" filter="url(#matrix-glow)" opacity="0.9"/>
  <circle cx="260" cy="185" r="3" fill="#000"/>

  <!-- Ring labels -->
  <text x="264" y="135" font-family="monospace" font-size="7.5" fill="#00ff41" opacity="0.4">75%</text>
  <text x="264" y="82" font-family="monospace" font-size="7.5" fill="#00ff41" opacity="0.4">90%</text>

  <!-- Axis Labels (outside polygon) -->
  <!-- Systems Engineering (top) -->
  <text x="260" y="40" font-family="monospace" font-size="10" fill="#00ff41" text-anchor="middle" font-weight="bold" filter="url(#soft-glow)">SYSTEMS ENGINEERING</text>
  <text x="260" y="52" font-family="monospace" font-size="8" fill="#00ff41" text-anchor="middle" opacity="0.5">96%</text>

  <!-- Neural Architecture (top-right) -->
  <text x="394" y="111" font-family="monospace" font-size="10" fill="#00ff41" text-anchor="start" font-weight="bold" filter="url(#soft-glow)">NEURAL ARCHITECTURE</text>
  <text x="394" y="123" font-family="monospace" font-size="8" fill="#00ff41" text-anchor="start" opacity="0.5">95%</text>

  <!-- Protocol Engineering (bottom-right) -->
  <text x="392" y="245" font-family="monospace" font-size="10" fill="#00ff41" text-anchor="start" font-weight="bold" filter="url(#soft-glow)">PROTOCOL ENGINEERING</text>
  <text x="392" y="257" font-family="monospace" font-size="8" fill="#00ff41" text-anchor="start" opacity="0.5">92%</text>

  <!-- Distributed Infrastructure (bottom) -->
  <text x="260" y="328" font-family="monospace" font-size="10" fill="#00ff41" text-anchor="middle" font-weight="bold" filter="url(#soft-glow)">DISTRIBUTED INFRASTRUCTURE</text>
  <text x="260" y="340" font-family="monospace" font-size="8" fill="#00ff41" text-anchor="middle" opacity="0.5">94%</text>

  <!-- Quantum Computing (bottom-left) -->
  <text x="122" y="248" font-family="monospace" font-size="10" fill="#00ff41" text-anchor="end" font-weight="bold" filter="url(#soft-glow)">QUANTUM COMPUTING</text>
  <text x="122" y="260" font-family="monospace" font-size="8" fill="#00ff41" text-anchor="end" opacity="0.5">88%</text>

  <!-- Execution Languages (top-left) -->
  <text x="126" y="110" font-family="monospace" font-size="10" fill="#00ff41" text-anchor="end" font-weight="bold" filter="url(#soft-glow)">EXECUTION LANGUAGES</text>
  <text x="126" y="122" font-family="monospace" font-size="8" fill="#00ff41" text-anchor="end" opacity="0.5">97%</text>

  <!-- ========================= RIGHT PANEL: LEGEND ========================= -->
  <rect x="520" y="20" width="248" height="320" rx="8" fill="#000" stroke="#00ff41" stroke-width="0.8" opacity="0.7"/>
  <text x="644" y="42" font-family="monospace" font-size="10" fill="#00ff41" text-anchor="middle" opacity="0.7">[ PROFICIENCY SCORES ]</text>
  <line x1="530" y1="50" x2="760" y2="50" stroke="#00ff41" stroke-width="0.5" opacity="0.3"/>

  <!-- SYSTEMS ENGINEERING -->
  <text x="534" y="72" font-family="monospace" font-size="9" fill="#00ff41">SYSTEMS ENGINEERING</text>
  <rect x="534" y="78" width="218" height="5" rx="2" fill="#001900"/>
  <rect x="534" y="78" width="209" height="5" rx="2" fill="#00ff41" opacity="0.85"/>
  <text x="755" y="83" font-family="monospace" font-size="7" fill="#00ff41" text-anchor="end" opacity="0.6">96%</text>

  <!-- NEURAL ARCHITECTURE -->
  <text x="534" y="103" font-family="monospace" font-size="9" fill="#00ff41">NEURAL ARCHITECTURE</text>
  <rect x="534" y="109" width="218" height="5" rx="2" fill="#001900"/>
  <rect x="534" y="109" width="207" height="5" rx="2" fill="#00ff41" opacity="0.85"/>
  <text x="755" y="114" font-family="monospace" font-size="7" fill="#00ff41" text-anchor="end" opacity="0.6">95%</text>

  <!-- PROTOCOL ENGINEERING -->
  <text x="534" y="134" font-family="monospace" font-size="9" fill="#00ff41">PROTOCOL ENGINEERING</text>
  <rect x="534" y="140" width="218" height="5" rx="2" fill="#001900"/>
  <rect x="534" y="140" width="201" height="5" rx="2" fill="#00ff41" opacity="0.85"/>
  <text x="755" y="145" font-family="monospace" font-size="7" fill="#00ff41" text-anchor="end" opacity="0.6">92%</text>

  <!-- DISTRIBUTED INFRASTRUCTURE -->
  <text x="534" y="165" font-family="monospace" font-size="9" fill="#00ff41">DISTRIBUTED INFRASTRUCTURE</text>
  <rect x="534" y="171" width="218" height="5" rx="2" fill="#001900"/>
  <rect x="534" y="171" width="205" height="5" rx="2" fill="#00ff41" opacity="0.85"/>
  <text x="755" y="176" font-family="monospace" font-size="7" fill="#00ff41" text-anchor="end" opacity="0.6">94%</text>

  <!-- QUANTUM COMPUTING -->
  <text x="534" y="196" font-family="monospace" font-size="9" fill="#00ff41">QUANTUM COMPUTING</text>
  <rect x="534" y="202" width="218" height="5" rx="2" fill="#001900"/>
  <rect x="534" y="202" width="192" height="5" rx="2" fill="#00ff41" opacity="0.85"/>
  <text x="755" y="207" font-family="monospace" font-size="7" fill="#00ff41" text-anchor="end" opacity="0.6">88%</text>

  <!-- EXECUTION LANGUAGES -->
  <text x="534" y="227" font-family="monospace" font-size="9" fill="#00ff41">EXECUTION LANGUAGES</text>
  <rect x="534" y="233" width="218" height="5" rx="2" fill="#001900"/>
  <rect x="534" y="233" width="211" height="5" rx="2" fill="#00ff41" opacity="0.85"/>
  <text x="755" y="238" font-family="monospace" font-size="7" fill="#00ff41" text-anchor="end" opacity="0.6">97%</text>

  <line x1="530" y1="252" x2="760" y2="252" stroke="#00ff41" stroke-width="0.5" opacity="0.3"/>

  <!-- Overall -->
  <text x="644" y="272" font-family="monospace" font-size="9" fill="#00ff41" text-anchor="middle">OVERALL INDEX</text>
  <rect x="534" y="279" width="218" height="8" rx="3" fill="#001900"/>
  <rect x="534" y="279" width="205" height="8" rx="3" fill="#00ff41" opacity="0.7"/>
  <text x="644" y="287" font-family="monospace" font-size="7" fill="#000" text-anchor="middle" font-weight="bold">94%</text>

  <text x="644" y="314" font-family="monospace" font-size="8" fill="#00ff41" text-anchor="middle" opacity="0.5" class="blink">[ COMPILING PARADIGMS... ]</text>
  <text x="644" y="330" font-family="monospace" font-size="7.5" fill="#00ff41" text-anchor="middle" opacity="0.3">STATUS: HYPER OPTIMIZED</text>

  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 360" width="840" height="360">
  <defs>
    <style>
      text { font-family: 'Segoe UI', system-ui, sans-serif; }
      .mono { font-family: 'SFMono-Regular', Consolas, monospace; }
      @keyframes fade-in { from{opacity:0} to{opacity:1} }
      @keyframes pulse-cap { 0%,100%{opacity:0.9} 50%{opacity:0.45} }
      .val  { animation: fade-in 0.9s 1.1s both; }
      .meta { animation: fade-in 0.9s 1.4s both; }
      .cap  { animation: pulse-cap 2.6s ease-in-out infinite; }
    </style>

    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#58a6ff"/><stop offset="1" stop-color="#79c0ff"/></linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#3fb950"/><stop offset="1" stop-color="#56d364"/></linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#388bfd"/><stop offset="1" stop-color="#58a6ff"/></linearGradient>
    <linearGradient id="g4" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#2ea043"/><stop offset="1" stop-color="#3fb950"/></linearGradient>
    <linearGradient id="g5" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#58a6ff"/><stop offset="1" stop-color="#79c0ff"/></linearGradient>
    <linearGradient id="g6" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#3fb950"/><stop offset="1" stop-color="#56d364"/></linearGradient>
    <filter id="gg" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Header -->
  <g transform="translate(42,0)">
    <circle cx="0" cy="26" r="3" fill="#58a6ff"/>
    <text x="12" y="30" font-size="12" font-weight="700" letter-spacing="2" fill="#e6edf3">SKILL PROFICIENCY</text>
    <text x="756" y="30" text-anchor="end" font-size="10" letter-spacing="1" class="mono" fill="#6e7681">SIX CORE DOMAINS · AVG 94%</text>
    <line x1="0" y1="42" x2="756" y2="42" stroke="#21262d" stroke-width="1"/>
  </g>

  <!-- ================= GAUGES (3 x 2) =================
       centers: cx 172 / 420 / 668   cy 108 / 247
       r=40  circumference=251.33 -->

  <!-- 1: EXECUTION LANGUAGES 97% -->
  <g transform="translate(172,108)">
    <circle r="48" fill="none" stroke="#30363d" stroke-width="1.4" stroke-dasharray="1.4 6.6" opacity="0.5"/>
    <circle r="40" fill="none" stroke="#1c2128" stroke-width="7"/>
    <circle r="40" fill="none" stroke="url(#g1)" stroke-width="7" stroke-linecap="round" filter="url(#gg)"
            transform="rotate(-90)" stroke-dasharray="251.33" stroke-dashoffset="251.33">
      <animate attributeName="stroke-dashoffset" from="251.33" to="7.54" dur="1.5s" begin="0.2s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
    </circle>
    <text y="2" text-anchor="middle" font-size="19" font-weight="700" fill="#e6edf3" class="val">97<tspan font-size="10" fill="#8b949e">%</tspan></text>
    <text y="15" text-anchor="middle" font-size="6" letter-spacing="1" fill="#6e7681" class="val">PROFICIENCY</text>
    <text y="60" text-anchor="middle" font-size="9.5" font-weight="600" letter-spacing="0.5" fill="#c9d1d9">EXECUTION LANGUAGES</text>
    <text y="72" text-anchor="middle" font-size="7" class="mono meta" fill="#8b949e">sub-microsecond hot paths</text>
    <text y="82" text-anchor="middle" font-size="6.5" class="mono meta" fill="#636e7b">lock-free · SIMD-optimized kernels</text>
  </g>

  <!-- 2: SYSTEMS ENGINEERING 96% -->
  <g transform="translate(420,108)">
    <circle r="48" fill="none" stroke="#30363d" stroke-width="1.4" stroke-dasharray="1.4 6.6" opacity="0.5"/>
    <circle r="40" fill="none" stroke="#1c2128" stroke-width="7"/>
    <circle r="40" fill="none" stroke="url(#g2)" stroke-width="7" stroke-linecap="round" filter="url(#gg)"
            transform="rotate(-90)" stroke-dasharray="251.33" stroke-dashoffset="251.33">
      <animate attributeName="stroke-dashoffset" from="251.33" to="10.05" dur="1.5s" begin="0.35s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
    </circle>
    <text y="2" text-anchor="middle" font-size="19" font-weight="700" fill="#e6edf3" class="val">96<tspan font-size="10" fill="#8b949e">%</tspan></text>
    <text y="15" text-anchor="middle" font-size="6" letter-spacing="1" fill="#6e7681" class="val">PROFICIENCY</text>
    <text y="60" text-anchor="middle" font-size="9.5" font-weight="600" letter-spacing="0.5" fill="#c9d1d9">SYSTEMS ENGINEERING</text>
    <text y="72" text-anchor="middle" font-size="7" class="mono meta" fill="#8b949e">custom cryptographic primitives</text>
    <text y="82" text-anchor="middle" font-size="6.5" class="mono meta" fill="#636e7b">high-frequency on-chain execution</text>
  </g>

  <!-- 3: NEURAL ARCHITECTURE 95% -->
  <g transform="translate(668,108)">
    <circle r="48" fill="none" stroke="#30363d" stroke-width="1.4" stroke-dasharray="1.4 6.6" opacity="0.5"/>
    <circle r="40" fill="none" stroke="#1c2128" stroke-width="7"/>
    <circle r="40" fill="none" stroke="url(#g3)" stroke-width="7" stroke-linecap="round" filter="url(#gg)"
            transform="rotate(-90)" stroke-dasharray="251.33" stroke-dashoffset="251.33">
      <animate attributeName="stroke-dashoffset" from="251.33" to="12.57" dur="1.5s" begin="0.5s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
    </circle>
    <text y="2" text-anchor="middle" font-size="19" font-weight="700" fill="#e6edf3" class="val">95<tspan font-size="10" fill="#8b949e">%</tspan></text>
    <text y="15" text-anchor="middle" font-size="6" letter-spacing="1" fill="#6e7681" class="val">PROFICIENCY</text>
    <text y="60" text-anchor="middle" font-size="9.5" font-weight="600" letter-spacing="0.5" fill="#c9d1d9">NEURAL ARCHITECTURE</text>
    <text y="72" text-anchor="middle" font-size="7" class="mono meta" fill="#8b949e">frontier-scale model training</text>
    <text y="82" text-anchor="middle" font-size="6.5" class="mono meta" fill="#636e7b">autonomous multi-agent swarms · ZKML</text>
  </g>

  <!-- 4: DISTRIBUTED INFRASTRUCTURE 94% -->
  <g transform="translate(172,247)">
    <circle r="48" fill="none" stroke="#30363d" stroke-width="1.4" stroke-dasharray="1.4 6.6" opacity="0.5"/>
    <circle r="40" fill="none" stroke="#1c2128" stroke-width="7"/>
    <circle r="40" fill="none" stroke="url(#g4)" stroke-width="7" stroke-linecap="round" filter="url(#gg)"
            transform="rotate(-90)" stroke-dasharray="251.33" stroke-dashoffset="251.33">
      <animate attributeName="stroke-dashoffset" from="251.33" to="15.08" dur="1.5s" begin="0.65s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
    </circle>
    <text y="2" text-anchor="middle" font-size="19" font-weight="700" fill="#e6edf3" class="val">94<tspan font-size="10" fill="#8b949e">%</tspan></text>
    <text y="15" text-anchor="middle" font-size="6" letter-spacing="1" fill="#6e7681" class="val">PROFICIENCY</text>
    <text y="60" text-anchor="middle" font-size="9.5" font-weight="600" letter-spacing="0.5" fill="#c9d1d9">DISTRIBUTED INFRASTRUCTURE</text>
    <text y="72" text-anchor="middle" font-size="7" class="mono meta" fill="#8b949e">millions of req/s · zero-downtime</text>
    <text y="82" text-anchor="middle" font-size="6.5" class="mono meta" fill="#636e7b">globally sharded validator clusters</text>
  </g>

  <!-- 5: PROTOCOL ENGINEERING 92% -->
  <g transform="translate(420,247)">
    <circle r="48" fill="none" stroke="#30363d" stroke-width="1.4" stroke-dasharray="1.4 6.6" opacity="0.5"/>
    <circle r="40" fill="none" stroke="#1c2128" stroke-width="7"/>
    <circle r="40" fill="none" stroke="url(#g5)" stroke-width="7" stroke-linecap="round" filter="url(#gg)"
            transform="rotate(-90)" stroke-dasharray="251.33" stroke-dashoffset="251.33">
      <animate attributeName="stroke-dashoffset" from="251.33" to="20.11" dur="1.5s" begin="0.8s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
    </circle>
    <text y="2" text-anchor="middle" font-size="19" font-weight="700" fill="#e6edf3" class="val">92<tspan font-size="10" fill="#8b949e">%</tspan></text>
    <text y="15" text-anchor="middle" font-size="6" letter-spacing="1" fill="#6e7681" class="val">PROFICIENCY</text>
    <text y="60" text-anchor="middle" font-size="9.5" font-weight="600" letter-spacing="0.5" fill="#c9d1d9">PROTOCOL ENGINEERING</text>
    <text y="72" text-anchor="middle" font-size="7" class="mono meta" fill="#8b949e">zk-rollups &amp; trustless bridges</text>
    <text y="82" text-anchor="middle" font-size="6.5" class="mono meta" fill="#636e7b">formally-verified smart contracts</text>
  </g>

  <!-- 6: QUANTUM COMPUTING 88% -->
  <g transform="translate(668,247)">
    <circle r="48" fill="none" stroke="#30363d" stroke-width="1.4" stroke-dasharray="1.4 6.6" opacity="0.5"/>
    <circle r="40" fill="none" stroke="#1c2128" stroke-width="7"/>
    <circle r="40" fill="none" stroke="url(#g6)" stroke-width="7" stroke-linecap="round" filter="url(#gg)"
            transform="rotate(-90)" stroke-dasharray="251.33" stroke-dashoffset="251.33">
      <animate attributeName="stroke-dashoffset" from="251.33" to="30.16" dur="1.5s" begin="0.95s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
    </circle>
    <text y="2" text-anchor="middle" font-size="19" font-weight="700" fill="#e6edf3" class="val">88<tspan font-size="10" fill="#8b949e">%</tspan></text>
    <text y="15" text-anchor="middle" font-size="6" letter-spacing="1" fill="#6e7681" class="val">PROFICIENCY</text>
    <text y="60" text-anchor="middle" font-size="9.5" font-weight="600" letter-spacing="0.5" fill="#c9d1d9">QUANTUM COMPUTING</text>
    <text y="72" text-anchor="middle" font-size="7" class="mono meta" fill="#8b949e">error-corrected qubit circuits</text>
    <text y="82" text-anchor="middle" font-size="6.5" class="mono meta" fill="#636e7b">quantum-accelerated optimization</text>
  </g>

  <!-- Footer -->
  <g transform="translate(42,0)">
    <line x1="0" y1="344" x2="756" y2="344" stroke="#21262d" stroke-width="1"/>
    <circle cx="4" cy="355" r="3" fill="#3fb950" class="cap"/>
    <text x="14" y="358" font-size="8" class="mono" fill="#636e7b">STATUS: HYPER OPTIMIZED</text>
    <text x="756" y="358" text-anchor="end" font-size="8" class="mono" fill="#636e7b">github.com/bhavy2908</text>
  </g>
</svg>

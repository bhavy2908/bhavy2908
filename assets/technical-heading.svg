<svg xmlns="http://www.w3.org/2000/svg" width="800" height="46" viewBox="0 0 800 46">
  <defs>
    <linearGradient id="hdAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="50%" stop-color="#3fb950"/>
      <stop offset="100%" stop-color="#58a6ff"/>
    </linearGradient>
    <linearGradient id="hdText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c9d1d9"/>
      <stop offset="50%" stop-color="#e6edf3"/>
      <stop offset="100%" stop-color="#c9d1d9"/>
    </linearGradient>
    <style>
      @keyframes hd-shimmer { 0%,100%{opacity:0.85} 50%{opacity:1} }
      .hd-line { animation: hd-shimmer 4s ease-in-out infinite; }
    </style>
  </defs>

  <!-- tagline -->
  <text x="400" y="18" text-anchor="middle" dominant-baseline="middle"
        font-family="'Segoe UI', 'Helvetica Neue', system-ui, sans-serif"
        font-size="13" letter-spacing="0.4" fill="url(#hdText)" class="hd-line">Protocol Architect specializing in high performance systems and autonomous AI swarms.</text>

</svg>

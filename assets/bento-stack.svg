<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 360" width="840" height="360">
  <defs>
    <style>
      @keyframes card-rise { 0%,100%{opacity:1} }
      @keyframes cursor-blink { 0%,100%{opacity:1} 50%{opacity:0} }

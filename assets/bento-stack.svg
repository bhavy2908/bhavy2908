<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 360" width="840" height="360">
  <defs>
    <style>
      @keyframes cell-flicker { 0%,100%{opacity:1} 92%{opacity:1} 93%{opacity:0.85} 94%{opacity:1} }
      @keyframes tag-glow { 0%,100%{filter:drop-shadow(0 0 3px #00ff41)} 50%{filter:drop-shadow(0 0 8px #00ff41)} }
      @keyframes cursor-blink { 0%,100%{opacity:1} 50%{opacity:0} }
      .cell { animation: cell-flicker 6s ease-in-out infinite; }
      .tag-glow-anim { animation: tag-glow 2s ease-in-out infinite; }
    </style>
    <radialGradient id="bentoBg2" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#030f03"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>

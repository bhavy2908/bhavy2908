      .mono { font-family: 'SFMono-Regular', Consolas, monospace; }
      .card { fill:#12161d; stroke:#2b323b; stroke-width:1; }
      .clabel { font-size:8.5px; fill:#6e7681; }
      .ctitle { font-weight:700; fill:#e6edf3; letter-spacing:0.4px; }
      .pill { fill: currentColor; fill-opacity:0.10; stroke: currentColor; stroke-opacity:0.45; stroke-width:0.9; }
      .pill2 { fill: currentColor; fill-opacity:0.05; stroke: currentColor; stroke-opacity:0.28; stroke-width:0.9; }
      .ptxt { font-size:9px; text-anchor:middle; fill: currentColor; }
      .ptxt2 { font-size:9px; text-anchor:middle; fill: currentColor; opacity:0.85; }
      .note { font-size:8px; fill:#6e7681; }
    </style>
    <linearGradient id="a-indigo" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#818cf8"/><stop offset="1" stop-color="#a5b4fc"/></linearGradient>

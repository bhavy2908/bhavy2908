<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 410" width="840" height="410">
  <defs>
    <style>
      @keyframes cursor-blink { 0%,100%{opacity:1} 50%{opacity:0} }
      @keyframes type-anim { from{opacity:0} to{opacity:1} }
      .mono { font-family: 'SFMono-Regular', 'JetBrains Mono', Consolas, monospace; }
      .cursor { animation: cursor-blink 1.1s infinite; }
      .line { animation: type-anim 0.1s both; }
      .key   { fill:#79c0ff; }
      .str   { fill:#7ee7c7; }
      .punc  { fill:#6e7681; }
      .cmd   { fill:#c9d1d9; }
      .ok    { fill:#56d4dd; }
      .msg   { fill:#adbac7; }
      .u-name{ fill:#bc8cff; font-weight:700; }
      .u-host{ fill:#58a6ff; font-weight:700; }
    </style>
    <linearGradient id="bGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#818cf8"/>
      <stop offset="100" stop-color="#56d4dd"/>
    </linearGradient>
    <linearGradient id="sideBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#56d4dd"/>
    </linearGradient>
    <filter id="winShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- ===== WINDOW ===== -->
  <rect x="20" y="18" width="800" height="374" rx="14" fill="#0d1117" stroke="#2b323b" stroke-width="1" filter="url(#winShadow)"/>

  <!-- Title bar -->
  <circle cx="44" cy="36" r="6" fill="#ff5f56"/>
  <circle cx="64" cy="36" r="6" fill="#ffbd2e"/>
  <circle cx="84" cy="36" r="6" fill="#27c93f"/>
  <text x="420" y="40" text-anchor="middle" class="mono" font-size="11" fill="#6e7681">bhavy@dev — zsh</text>
  <line x1="20" y1="54" x2="820" y2="54" stroke="#2b323b" stroke-width="1"/>

  <!-- ====== LEFT: SIDEBAR ====== -->
  <g class="mono" font-size="11" fill="url(#bGrad)">
    <text x="48" y="92"  class="line" style="animation-delay:0.1s">██████╗ </text>
    <text x="48" y="108" class="line" style="animation-delay:0.2s">██╔══██╗</text>
    <text x="48" y="124" class="line" style="animation-delay:0.3s">██████╔╝</text>
    <text x="48" y="140" class="line" style="animation-delay:0.4s">██╔══██╗</text>
    <text x="48" y="156" class="line" style="animation-delay:0.5s">██████╔╝</text>
    <text x="48" y="172" class="line" style="animation-delay:0.6s">╚═════╝ </text>
  </g>

  <g class="mono" font-size="10">
    <text x="48" y="208" class="line" style="animation-delay:0.8s"><tspan fill="#8b949e">Host:  </tspan><tspan fill="#c9d1d9"> bhavy2908</tspan></text>
    <text x="48" y="228" class="line" style="animation-delay:1.0s"><tspan fill="#8b949e">Rank:  </tspan><tspan fill="#c9d1d9"> Crypto Deity</tspan></text>
    <text x="48" y="248" class="line" style="animation-delay:1.2s"><tspan fill="#8b949e">Uptime:</tspan><tspan fill="#c9d1d9"> 99.9%</tspan></text>
    <text x="48" y="268" class="line" style="animation-delay:1.4s"><tspan fill="#8b949e">Coffee:</tspan><tspan fill="#56d4dd"> [||||||||--] 80%</tspan></text>
    <text x="48" y="288" class="line" style="animation-delay:1.6s"><tspan fill="#8b949e">Mode:  </tspan><tspan fill="#c9d1d9"> Flow State</tspan></text>
  </g>

  <!-- Status indicators -->
  <rect x="48" y="318" width="12" height="12" rx="3" fill="#818cf8" opacity="0.95"/>
  <rect x="66" y="318" width="12" height="12" rx="3" fill="#58a6ff" opacity="0.75"/>
  <rect x="84" y="318" width="12" height="12" rx="3" fill="#56d4dd" opacity="0.55"/>
  <rect x="102" y="318" width="12" height="12" rx="3" fill="#7ee7c7" opacity="0.35"/>

  <!-- vertical divider -->
  <line x1="210" y1="66" x2="210" y2="378" stroke="#21262d" stroke-width="1"/>

  <!-- ====== RIGHT: TERMINAL ====== -->
  <g class="mono" font-size="11.5">
    <!-- Prompt 1 -->
    <text x="234" y="88" class="line" style="animation-delay:0.5s">
      <tspan class="u-name">bhavy</tspan><tspan class="punc">@</tspan><tspan class="u-host">dev</tspan><tspan class="punc">:~$ </tspan><tspan class="cmd">cat manifest.json</tspan>
    </text>

    <text x="234" y="110" class="line punc" style="animation-delay:1.5s"> {</text>

    <text x="234" y="132" class="line" style="animation-delay:1.8s">
      <tspan class="key">   "status": </tspan><tspan class="str">"Currently optimizing reality."</tspan><tspan class="punc">,</tspan>
    </text>

    <text x="234" y="154" class="line" font-size="10.5" style="animation-delay:2.1s">
      <tspan class="key">   "philosophy": </tspan><tspan class="str">"If a framework dropped 5 minutes ago, I've already refactored my life to use it."</tspan><tspan class="punc">,</tspan>
    </text>

    <text x="234" y="176" class="line" font-size="10.5" style="animation-delay:2.4s">
      <tspan class="key">   "standard": </tspan><tspan class="str">"I don't chase perfection; I just refuse to ship anything that isn't flawless."</tspan><tspan class="punc">,</tspan>
    </text>

    <text x="234" y="198" class="line" font-size="10.5" style="animation-delay:2.7s">
      <tspan class="key">   "crypto_god_mode": </tspan><tspan class="str">"Active. Bridging paradigms while the rest are still checking gas prices."</tspan><tspan class="punc">,</tspan>
    </text>

    <text x="234" y="220" class="line" style="animation-delay:3.0s">
      <tspan class="key">   "comms": </tspan><tspan class="str">"@bh4vy (IG / Discord)"</tspan>
    </text>

    <text x="234" y="242" class="line punc" style="animation-delay:3.3s"> }</text>

    <!-- Git Prompt -->
    <text x="234" y="266" class="line" style="animation-delay:3.8s">
      <tspan class="u-name">bhavy</tspan><tspan class="punc">@</tspan><tspan class="u-host">dev</tspan><tspan class="punc">:~$ </tspan><tspan class="cmd">git push origin main force:true</tspan>
    </text>
    <text x="234" y="286" class="line" font-size="10.5" style="animation-delay:4.5s">
      <tspan class="ok">[ OK ] </tspan><tspan class="msg">Reality successfully overwritten. No conflicts found.</tspan>
    </text>

    <!-- Prompt 2 -->
    <text x="234" y="310" class="line" style="animation-delay:5.5s">
      <tspan class="u-name">bhavy</tspan><tspan class="punc">@</tspan><tspan class="u-host">dev</tspan><tspan class="punc">:~$ </tspan><tspan class="cmd">sudo brew caffeine --intensity=max</tspan>
    </text>
    <text x="234" y="330" class="line" font-size="10.5" style="animation-delay:6.3s">
      <tspan class="ok">[ OK ] </tspan><tspan class="msg">Grinding beans into high-performance logic...</tspan>
    </text>
    <text x="234" y="348" class="line" font-size="10.5" style="animation-delay:6.7s">
      <tspan class="ok">[ OK ] </tspan><tspan class="msg">Extracting liquid focus...</tspan>
    </text>
    <text x="234" y="366" class="line" font-size="10.5" style="animation-delay:7.1s">
      <tspan class="ok">[ OK ] </tspan><tspan class="msg">System ready for 48-hour sprint.</tspan>
    </text>

    <!-- Final prompt -->
    <text x="234" y="386" class="line" style="animation-delay:8.0s">
      <tspan class="u-name">bhavy</tspan><tspan class="punc">@</tspan><tspan class="u-host">dev</tspan><tspan class="punc">:~$ </tspan><tspan class="ok cursor">█</tspan>
    </text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 410" width="840" height="410">
  <defs>
    <style>
      @keyframes cursor-blink { 0%,100%{opacity:1} 50%{opacity:0} }
      .mono { font-family: 'SFMono-Regular', 'JetBrains Mono', Consolas, monospace; }
      .cursor { animation: cursor-blink 1.1s infinite; }
      .key   { fill:#79c0ff; }
      .str   { fill:#56d364; }
      .punc  { fill:#6e7681; }
      .cmd   { fill:#c9d1d9; }
      .ok    { fill:#3fb950; }
      .msg   { fill:#adbac7; }
      .u-name{ fill:#58a6ff; font-weight:700; }
      .u-host{ fill:#388bfd; font-weight:700; }
    </style>
    <linearGradient id="bGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#58a6ff"/>
      <stop offset="100" stop-color="#3fb950"/>
    </linearGradient>
    <filter id="winShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- ===== WINDOW ===== -->
  <rect x="20" y="18" width="800" height="374" rx="14" fill="#0d1117" stroke="#2b323b" stroke-width="1" filter="url(#winShadow)"/>

  <!-- Title bar -->
  <circle cx="44" cy="36" r="6" fill="#ff5f56"/>
  <circle cx="64" cy="36" r="6" fill="#ffbd2e"/>
  <circle cx="84" cy="36" r="6" fill="#27c93f"/>
  <text x="420" y="40" text-anchor="middle" class="mono" font-size="11" fill="#6e7681">bhavy@dev — zsh</text>
  <line x1="20" y1="54" x2="820" y2="54" stroke="#2b323b" stroke-width="1"/>

  <!-- ====== LEFT: SIDEBAR ====== -->
  <g class="mono" font-size="11" fill="url(#bGrad)">
    <text x="48" y="92"  opacity="0">██████╗ <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.1s" fill="freeze"/></text>
    <text x="48" y="108" opacity="0">██╔══██╗<animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.2s" fill="freeze"/></text>
    <text x="48" y="124" opacity="0">██████╔╝<animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.3s" fill="freeze"/></text>
    <text x="48" y="140" opacity="0">██╔══██╗<animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.4s" fill="freeze"/></text>
    <text x="48" y="156" opacity="0">██████╔╝<animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.5s" fill="freeze"/></text>
    <text x="48" y="172" opacity="0">╚═════╝ <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.6s" fill="freeze"/></text>
  </g>

  <g class="mono" font-size="10">
    <text x="48" y="208" opacity="0"><tspan fill="#8b949e">Host:  </tspan><tspan fill="#c9d1d9"> bhavy2908</tspan><animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.8s" fill="freeze"/></text>
    <text x="48" y="228" opacity="0"><tspan fill="#8b949e">Rank:  </tspan><tspan fill="#e3b341"> Crypto Deity</tspan><animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.0s" fill="freeze"/></text>
    <text x="48" y="248" opacity="0"><tspan fill="#8b949e">Uptime:</tspan><tspan fill="#c9d1d9"> 99.9%</tspan><animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.2s" fill="freeze"/></text>
    <text x="48" y="268" opacity="0"><tspan fill="#8b949e">Coffee:</tspan><tspan fill="#e3b341"> [||||||||--] 80%</tspan><animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.4s" fill="freeze"/></text>
    <text x="48" y="288" opacity="0"><tspan fill="#8b949e">Mode:  </tspan><tspan fill="#c9d1d9"> Flow State</tspan><animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.6s" fill="freeze"/></text>
  </g>

  <!-- Status indicators -->
  <rect x="48" y="318" width="12" height="12" rx="3" fill="#58a6ff" opacity="0.95"/>
  <rect x="66" y="318" width="12" height="12" rx="3" fill="#3fb950" opacity="0.8"/>
  <rect x="84" y="318" width="12" height="12" rx="3" fill="#e3b341" opacity="0.65"/>
  <rect x="102" y="318" width="12" height="12" rx="3" fill="#f2cc60" opacity="0.4"/>

  <!-- vertical divider -->
  <line x1="210" y1="66" x2="210" y2="378" stroke="#21262d" stroke-width="1"/>

  <!-- ====== RIGHT: TERMINAL ====== -->
  <g class="mono" font-size="11.5">
    <!-- Prompt 1 -->
    <text x="234" y="88" opacity="0">
      <tspan class="u-name">bhavy</tspan><tspan class="punc">@</tspan><tspan class="u-host">dev</tspan><tspan class="punc">:~$ </tspan><tspan class="cmd">cat manifest.json</tspan>
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.5s" fill="freeze"/>
    </text>

    <text x="234" y="110" class="punc" opacity="0"> {<animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.5s" fill="freeze"/></text>

    <text x="234" y="132" opacity="0">
      <tspan class="key">   "status": </tspan><tspan class="str">"Currently optimizing reality."</tspan><tspan class="punc">,</tspan>
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.8s" fill="freeze"/>
    </text>

    <text x="234" y="154" font-size="9.2" opacity="0">
      <tspan class="key">   "philosophy": </tspan><tspan class="str">"If a framework dropped 5 minutes ago, I've already refactored my life to use it."</tspan><tspan class="punc">,</tspan>
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.1s" fill="freeze"/>
    </text>

    <text x="234" y="176" font-size="9.2" opacity="0">
      <tspan class="key">   "standard": </tspan><tspan class="str">"I don't chase perfection; I just refuse to ship anything that isn't flawless."</tspan><tspan class="punc">,</tspan>
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.4s" fill="freeze"/>
    </text>

    <text x="234" y="198" font-size="9.2" opacity="0">
      <tspan class="key">   "crypto_god_mode": </tspan><tspan class="str">"Active. Bridging paradigms while the rest are still checking gas prices."</tspan><tspan class="punc">,</tspan>
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.7s" fill="freeze"/>
    </text>

    <text x="234" y="220" opacity="0">
      <tspan class="key">   "comms": </tspan><tspan class="str">"@bh4vy (IG / Discord)"</tspan>
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="3.0s" fill="freeze"/>
    </text>

    <text x="234" y="242" class="punc" opacity="0"> }<animate attributeName="opacity" values="0;1" dur="0.3s" begin="3.3s" fill="freeze"/></text>

    <!-- Git Prompt -->
    <text x="234" y="262" opacity="0">
      <tspan class="u-name">bhavy</tspan><tspan class="punc">@</tspan><tspan class="u-host">dev</tspan><tspan class="punc">:~$ </tspan><tspan class="cmd">git push origin main force:true</tspan>
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="3.8s" fill="freeze"/>
    </text>
    <text x="234" y="282" font-size="10.5" opacity="0">
      <tspan class="ok">[ OK ] </tspan><tspan class="msg">Reality successfully overwritten. No conflicts found.</tspan>
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="4.5s" fill="freeze"/>
    </text>

    <!-- Prompt 2 -->
    <text x="234" y="304" opacity="0">
      <tspan class="u-name">bhavy</tspan><tspan class="punc">@</tspan><tspan class="u-host">dev</tspan><tspan class="punc">:~$ </tspan><tspan class="cmd">sudo brew caffeine --intensity=max</tspan>
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="5.5s" fill="freeze"/>
    </text>
    <text x="234" y="322" font-size="10.5" opacity="0">
      <tspan class="ok">[ OK ] </tspan><tspan class="msg">Grinding beans into high-performance logic...</tspan>
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="6.3s" fill="freeze"/>
    </text>
    <text x="234" y="340" font-size="10.5" opacity="0">
      <tspan class="ok">[ OK ] </tspan><tspan class="msg">Extracting liquid focus...</tspan>
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="6.7s" fill="freeze"/>
    </text>
    <text x="234" y="358" font-size="10.5" opacity="0">
      <tspan class="ok">[ OK ] </tspan><tspan class="msg">System ready for 48-hour sprint.</tspan>
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="7.1s" fill="freeze"/>
    </text>

    <!-- Final prompt -->
    <text x="234" y="376" opacity="0">
      <tspan class="u-name">bhavy</tspan><tspan class="punc">@</tspan><tspan class="u-host">dev</tspan><tspan class="punc">:~$ </tspan><tspan class="ok cursor">█</tspan>
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="8.0s" fill="freeze"/>
    </text>
  </g>
</svg>
